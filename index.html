<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

/* =========================================================
LIVE CSV SOURCE
========================================================= */

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vRHrcy8mR6WAzqxaQHAlDwEZ_N9lyagn3aHPItCDV4-NkIsNr1lJb67gWQWcvedllMIOMgiWB-bqHZi/pub?gid=764802717&single=true&output=csv';

/* =========================================================
GLOBAL DATA
========================================================= */

let CONSULTANTS = [];

const KEYS = [
  'healthcare',
  'nabh',
  'coordination',
  'mep',
  'documentation',
  'cost',
  'opex'
];

let W = {
  healthcare:20,
  nabh:18,
  coordination:16,
  mep:16,
  documentation:12,
  cost:8,
  opex:10
};

/* =========================================================
BOOT
========================================================= */

window.addEventListener('DOMContentLoaded', async () => {

  initializeSliders();

  await loadCSV();

  renderAll();

});

/* =========================================================
LOAD CSV
========================================================= */

async function loadCSV() {

  Papa.parse(CSV_URL, {

    download: true,
    header: true,
    skipEmptyLines: true,

    complete: function(results) {

      CONSULTANTS = results.data.map(parseConsultant);

      console.log('LIVE CONSULTANTS:', CONSULTANTS);

      renderAll();

    }

  });

}

/* =========================================================
PARSE CONSULTANT
========================================================= */

function parseConsultant(row) {

  const raw = JSON.stringify(row).toLowerCase();

  const firm =
    row['Legal Corporate Name of Firm'] ||
    row['Firm Name'] ||
    'Unnamed Consultant';

  const domain =
    row['Select your primary engineering/consultancy domain for this project'] ||
    row['Domain'] ||
    'Unknown';

  const team =
    row['Total Strength of Active Full-Time Technical Personnel (Firm Size)'] ||
    row['Team Size'] ||
    'Undisclosed';

  const healthcare = scoreHealthcare(raw);
  const nabh = scoreNABH(raw);
  const coordination = scoreCoordination(raw);
  const mep = scoreMEP(raw);
  const documentation = scoreDocumentation(raw);
  const cost = scoreCost(raw);
  const opex = scoreOPEX(raw);

  const weighted =
    calculateWeighted({
      healthcare,
      nabh,
      coordination,
      mep,
      documentation,
      cost,
      opex
    });

  return {

    name: firm,
    domain: domain,
    team: team,

    scores: {
      healthcare,
      nabh,
      coordination,
      mep,
      documentation,
      cost,
      opex
    },

    weighted,

    grade: grade(weighted),

    risk: riskLabel(weighted),

    recommendation: recommendation(domain, weighted)

  };

}

/* =========================================================
SCORING ENGINE
========================================================= */

function contains(raw, arr) {
  return arr.some(k => raw.includes(k));
}

function scoreHealthcare(raw) {

  let s = 35;

  if (contains(raw,['hospital'])) s += 20;
  if (contains(raw,['healthcare'])) s += 15;
  if (contains(raw,['icu'])) s += 10;
  if (contains(raw,['medical'])) s += 10;
  if (contains(raw,['rehabilitation'])) s += 8;
  if (contains(raw,['institutional'])) s += 5;

  return clamp(s);

}

function scoreNABH(raw) {

  let s = 30;

  if (contains(raw,['nabh'])) s += 25;
  if (contains(raw,['fire noc'])) s += 15;
  if (contains(raw,['aerb'])) s += 10;
  if (contains(raw,['medical gas'])) s += 10;
  if (contains(raw,['statutory'])) s += 10;

  return clamp(s);

}

function scoreCoordination(raw) {

  let s = 35;

  if (contains(raw,['pmc'])) s += 25;
  if (contains(raw,['coordination'])) s += 20;
  if (contains(raw,['site'])) s += 10;
  if (contains(raw,['execution'])) s += 10;
  if (contains(raw,['construction'])) s += 10;

  return clamp(s);

}

function scoreMEP(raw) {

  let s = 30;

  if (contains(raw,['mep'])) s += 25;
  if (contains(raw,['hvac'])) s += 20;
  if (contains(raw,['electrical'])) s += 15;
  if (contains(raw,['fire'])) s += 15;
  if (contains(raw,['plumbing'])) s += 10;
  if (contains(raw,['medical gas'])) s += 15;

  return clamp(s);

}

function scoreDocumentation(raw) {

  let s = 35;

  if (contains(raw,['gfc'])) s += 20;
  if (contains(raw,['tender'])) s += 15;
  if (contains(raw,['boq'])) s += 10;
  if (contains(raw,['documentation'])) s += 15;
  if (contains(raw,['rfi'])) s += 10;

  return clamp(s);

}

function scoreCost(raw) {

  let s = 65;

  if (contains(raw,['small'])) s += 10;
  if (contains(raw,['lean'])) s += 10;

  return clamp(s);

}

function scoreOPEX(raw) {

  let s = 40;

  if (contains(raw,['sustainable'])) s += 15;
  if (contains(raw,['maintainability'])) s += 15;
  if (contains(raw,['energy'])) s += 10;
  if (contains(raw,['lifecycle'])) s += 20;

  return clamp(s);

}

function clamp(v) {
  return Math.max(0, Math.min(100, v));
}

/* =========================================================
WEIGHTED SCORE
========================================================= */

function calculateWeighted(scores) {

  const totalWeight =
    Object.values(W).reduce((a,b)=>a+b,0);

  let total = 0;

  KEYS.forEach(k => {

    total +=
      (scores[k] * W[k]) / totalWeight;

  });

  return Math.round(total);

}

/* =========================================================
GRADE LOGIC
========================================================= */

function grade(score) {

  if (score >= 85)
    return 'Institutional Grade';

  if (score >= 72)
    return 'Strong';

  if (score >= 58)
    return 'Moderate';

  return 'Elevated Risk';

}

function riskLabel(score) {

  if (score >= 82)
    return 'Lower Coordination Risk';

  if (score >= 65)
    return 'Moderate Coordination Risk';

  return 'Elevated Delivery Risk';

}

function recommendation(domain, score) {

  const d = domain.toLowerCase();

  if (d.includes('pmc'))
    return 'Suitable for delivery governance';

  if (d.includes('mep'))
    return 'Suitable for specialist healthcare systems';

  if (score >= 80)
    return 'Suitable for institutional shortlist';

  if (score >= 65)
    return 'Requires coordination validation';

  return 'Not preferred for lead institutional role';

}

/* =========================================================
SORT
========================================================= */

function sorted() {

  return [...CONSULTANTS]
    .sort((a,b)=>b.weighted-a.weighted);

}

/* =========================================================
RENDER ALL
========================================================= */

function renderAll() {

  renderRankings();

  renderCommittee();

  renderPitchStats();

  renderNarrative();

}

/* =========================================================
COMMAND RANKINGS
========================================================= */

function renderRankings() {

  const list =
    document.getElementById('clist');

  if (!list) return;

  const data = sorted();

  list.innerHTML = data.map((c,i)=>{

    const cls =
      i===0 ? 'r1' :
      i===1 ? 'r2' :
      i===2 ? 'r3' : '';

    const gradeClass =
      c.grade === 'Institutional Grade'
      ? 'ga'
      : c.grade === 'Strong'
      ? 'gb'
      : 'gc';

    return `

    <div class="ccard ${cls}">

      <div class="ranknum">
        ${String(i+1).padStart(2,'0')}
      </div>

      <div>

        <div class="cname">
          ${c.name}
        </div>

        <div class="cdomain">
          ${c.domain} · ${c.team}
        </div>

        <div class="crole">
          ${c.recommendation}
        </div>

      </div>

      <div class="cscore-area">

        <div class="cscore">
          ${c.weighted}
        </div>

        <div class="cbar-track">
          <div class="cbar-fill"
            style="width:${c.weighted}%">
          </div>
        </div>

        <span class="gbadge ${gradeClass}">
          ${c.grade}
        </span>

      </div>

    </div>

    `;

  }).join('');

}

/* =========================================================
COMMITTEE TABLE
========================================================= */

function renderCommittee() {

  const body =
    document.getElementById('cm-tbody');

  if (!body) return;

  body.innerHTML =
    sorted().map(c=>`

    <tr>

      <td>${c.name}</td>
      <td>${c.domain}</td>

      <td>${c.scores.healthcare}</td>
      <td>${c.scores.nabh}</td>
      <td>${c.scores.coordination}</td>
      <td>${c.scores.mep}</td>
      <td>${c.scores.documentation}</td>
      <td>${c.scores.cost}</td>
      <td>${c.scores.opex}</td>

      <td class="cm-score">
        ${c.weighted}
      </td>

      <td>
        <span class="cm-grade ${
          c.grade === 'Institutional Grade'
          ? 'ga'
          : c.grade === 'Strong'
          ? 'gb'
          : 'gc'
        }">
          ${c.grade}
        </span>
      </td>

    </tr>

    `).join('');

}

/* =========================================================
LIVE COUNTS
========================================================= */

function renderPitchStats() {

  const stats =
    document.querySelectorAll('.pstat-n');

  if (!stats.length) return;

  stats[0].innerText =
    CONSULTANTS.length;

}

/* =========================================================
NARRATIVE ENGINE
========================================================= */

function renderNarrative() {

  const el =
    document.getElementById('nlg-out');

  if (!el) return;

  const top = sorted()[0];

  el.innerHTML = `

  <p>
  <span class="hl">
  ${CONSULTANTS.length} consultant responses
  </span>
  are currently mapped live from the procurement intelligence database.
  </p>

  <p>
  The present calibration favors
  <span class="hl">
  institutional survivability
  </span>,
  multidisciplinary coordination depth,
  and healthcare systems maturity over portfolio aesthetics.
  </p>

  <p>
  The current highest-ranked ecosystem is
  <span class="hl">
  ${top?.name || 'Awaiting Data'}
  </span>
  based on the active weighting configuration.
  </p>

  <p>
  The intelligence engine continues to dynamically recalculate:
  coordination risk,
  NABH readiness,
  MEP integration maturity,
  documentation depth,
  and lifecycle governance capability
  as new consultant responses enter the live database.
  </p>

  `;

}

/* =========================================================
SLIDERS
========================================================= */

function initializeSliders() {

  const sliders =
    document.querySelectorAll('.wslider');

  sliders.forEach(slider => {

    slider.addEventListener('input', e => {

      const key =
        e.target.dataset.key;

      const val =
        parseInt(e.target.value);

      W[key] = val;

      const out =
        document.getElementById(
          `sv-${key}`
        );

      if (out)
        out.innerText = val;

      CONSULTANTS =
        CONSULTANTS.map(c=>{

          c.weighted =
            calculateWeighted(c.scores);

          c.grade =
            grade(c.weighted);

          c.risk =
            riskLabel(c.weighted);

          return c;

        });

      renderAll();

    });

  });

}

</script>
